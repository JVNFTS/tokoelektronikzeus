<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Customer – Zeus</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <div class="nav-brand">⚡ Zeus <span>Toko Elektronik</span></div>
    <div class="nav-links">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/barang" class="nav-link">Barang</a>
        <a href="/customer" class="nav-link active">Customer</a>
        <a href="/transaksi" class="nav-link">Transaksi</a>
        <a href="/transaksi/restock" class="nav-link">Restock</a>
        <a href="/laporan/stok" class="nav-link">Laporan</a>
    </div>
    <div class="nav-right">
        <a href="/logout" class="btn btn-secondary btn-sm">Keluar</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <div>
            <h2 th:text="${mode == 'tambah'} ? 'Tambah Customer' : 'Edit Customer'"></h2>
            <p>Isi data pelanggan di bawah ini</p>
        </div>
        <a href="/customer" class="btn btn-secondary">← Kembali</a>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="form-card">
        <form th:action="${mode == 'tambah'} ? @{/customer/simpan} : @{/customer/update}"
              th:object="${customer}" method="post">

            <input type="hidden" th:if="${mode == 'edit'}" th:field="*{id}">

            <div class="form-grid">
                <div class="form-group full">
                    <label>Nama Customer</label>
                    <input type="text" th:field="*{namaCustomer}" placeholder="Nama lengkap pelanggan">
                </div>
                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="text" th:field="*{noTelepon}" placeholder="08xxxxxxxxxx">
                </div>
                <div class="form-group full">
                    <label>Alamat</label>
                    <textarea th:field="*{alamat}" rows="3" placeholder="Alamat lengkap"></textarea>
                </div>
            </div>

            <div style="display:flex; gap:12px; margin-top:28px;">
                <button type="submit" class="btn btn-primary">Simpan</button>
                <a href="/customer" class="btn btn-secondary">Batal</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
