<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Customer – Zeus</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <div class="nav-brand">⚡ Zeus <span>Toko Elektronik</span></div>
    <div class="nav-links">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/barang" class="nav-link">Barang</a>
        <a href="/customer" class="nav-link active">Customer</a>
        <a href="/transaksi" class="nav-link">Transaksi</a>
        <a href="/transaksi/restock" class="nav-link">Restock</a>
        <a href="/laporan/stok" class="nav-link">Laporan</a>
    </div>
    <div class="nav-right">
        <a href="/logout" class="btn btn-secondary btn-sm">Keluar</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <div>
            <h2>Data Customer</h2>
            <p>Kelola data pelanggan toko</p>
        </div>
        <a href="/customer/tambah" class="btn btn-primary">+ Tambah Customer</a>
    </div>

    <!-- Search -->
    <form method="get" action="/customer" class="filter-bar" style="margin-bottom:20px;">
        <div class="form-group">
            <label>Cari Nama</label>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Nama customer...">
        </div>
        <button type="submit" class="btn btn-primary">Cari</button>
        <a href="/customer" class="btn btn-secondary">Reset</a>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama Customer</th>
                    <th>No. Telepon</th>
                    <th>Alamat</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${listCustomer}">
                    <td th:text="${c.id}" style="color:#f0b429; font-weight:600;"></td>
                    <td th:text="${c.namaCustomer}" style="font-weight:500;"></td>
                    <td th:text="${c.noTelepon}"></td>
                    <td th:text="${c.alamat}" style="max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></td>
                    <td>
                        <a th:href="@{/customer/edit/{id}(id=${c.id})}" class="btn btn-secondary btn-sm">Edit</a>
                        <a th:href="@{/customer/hapus/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Hapus customer ini?')">Hapus</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listCustomer)}">
                    <td colspan="5" style="text-align:center; color:#4b5563; padding:32px;">
                        Belum ada data customer. <a href="/customer/tambah" style="color:#f0b429;">Tambah sekarang</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
